name: Daily Data Ingestion and Clustering

on:
  schedule:
    # Runs every 4 hours at minute 0
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  ingest-and-cluster:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'sqlite:///data/conflux.db' }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SUBREDDIT: 'delhi'
      HOURS_BACK: 4
      PATH: $HOME/.cargo/bin:$PATH

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Validate env vars
      run: |
        echo "DATABASE_URL set: $([ -n "$DATABASE_URL" ] && echo 'YES' || echo 'NO')"
        echo "SUBREDDIT: $SUBREDDIT"
        echo "HOURS_BACK: $HOURS_BACK"

    - name: Install dependencies
      run: uv sync

    - name: Run Ingestion and Clustering Job
      run: |
        set -e
        uv run worker/ingest_and_cluster.py 2>&1
