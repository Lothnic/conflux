name: Daily Data Ingestion and Clustering

on:
  schedule:
    # Runs every day at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  ingest-and-cluster:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'sqlite:///data/conflux.db' }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEO_LLM_API_KEY: ${{ secrets.GEO_LLM_API_KEY }}
      LLM_GEOLOCATION_ENABLED: "1"
      LOCAL_GEO_FALLBACK_ENABLED: "1"
      GEOCODE_CITY_FALLBACK_ENABLED: "0"
      NEWS_INGEST_ENABLED: "1"
      REDDIT_INGEST_ENABLED: "0"
      HOURS_BACK: 24
      PATH: $HOME/.cargo/bin:$PATH

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh

    - name: Validate env vars
      run: |
        echo "DATABASE_URL set: $([ -n "$DATABASE_URL" ] && echo 'YES' || echo 'NO')"
        test -n "$DATABASE_URL" || (echo "DATABASE_URL is required for scheduled ingestion" && exit 1)
        echo "NEWS_INGEST_ENABLED: $NEWS_INGEST_ENABLED"
        echo "REDDIT_INGEST_ENABLED: $REDDIT_INGEST_ENABLED"
        echo "HOURS_BACK: $HOURS_BACK"

    - name: Install dependencies
      run: uv sync

    - name: Run Ingestion and Clustering Job
      run: |
        set -e
        uv run worker/ingest_and_cluster.py 2>&1
