services:
# Note: Render currently requires a "Web Service" or "Private Service" 
# to provision a "Cron Job" via the API/Terraform, but in the dashboard 
# you can add a Cron Job to any service. This file documents the job itself.

cronJobs:
  - name: conflux-daily-ingest
    # Runs every 4 hours: 0 0,4,8,12,16,20 * * *
    schedule: "0 */4 * * *"
    # Path to the script inside the project structure
    command: "uv run worker/ingest_and_cluster.py"
    # Optional: You can link the same service that hosts the worker script
    # or create a separate "Static Site" / "Cron Job" resource in Render.
